spring.application.name=viemp3

# SERVER FE
server.fe.dev=${SERVER_FE_DEV}
server.fe.product=${SERVER_FE_PRODUCT}

# ===============================
# DATABASE CONFIG
# ===============================
spring.datasource.url=jdbc:mysql://${SPRING_DATASOURCE_HOST}:${SPRING_DATASOURCE_PORT}/${SPRING_DATASOURCE_NAME_DB}?useSSL=false&serverTimezone=UTC
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.type.preferred_uuid_jdbc_type=BINARY

# ===============================
# MAIL CONFIG (důng Gmail SMTP)
# ===============================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${SPRING_MAIL_USERNAME}
spring.mail.password=${SPRING_MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ===============================
# FILE SIZE CONFIG
# ===============================
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# ===============================
# JWT CONFIG
# ===============================
jwt.secretKey=${JWT_SECRET_KEY}
jwt.accessToken.expiration=${JWT_ACCESS_TOKEN_EXPIRATION}
jwt.refreshToken.expiration=${JWT_REFRESH_TOKEN_EXPIRATION}

# ===============================
# CLOUDINARY CONFIG
# ===============================
cloudinary.cloud-name=${CLOUDINARY_NAME}
cloudinary.api-key=${CLOUDINARY_API_KEY}
cloudinary.api-secret=${CLOUDINARY_API_SECRET}

# ===============================
# ADMIN CONFIG
# ===============================
admin.username=${ADMIN_USERNAME}
admin.email=${ADMIN_EMAIL}
admin.password=${ADMIN_PASSWORD}

# ===============================
# MOD CONFIG
# ===============================
mod.username=${MOD_USERNAME}
mod.email=${MOD_EMAIL}
mod.password=${MOD_PASSWORD}

# ===============================
# OPEN AI CONFIG
# ===============================
spring.ai.openai.api-key=${OPEN_API_KEY}
spring.ai.openai.chat.base-url=https://generativelanguage.googleapis.com
spring.ai.openai.chat.completions-path=/v1beta/openai/chat/completions
spring.ai.openai.chat.options.model=gemini-3-flash-preview
spring.ai.chat.memory.repository.jdbc.initialize-schema=never
spring.ai.chat.memory.in-memory.enabled=true

# ===============================
# DOMAIN CONFIG
# ===============================
server.domain-url=${SERVER_DOMAIN_URL}

# ===============================
# API CONFIG
# ===============================
api.vie-mp3-url=${API_VIE_MP3_URL}